---
name: Populate Renovate resources
on:
  pull_request:
    branches:
      - main
      - release/*
permissions:
  contents: write
  id-token: write # needed for keyless signing
  pull-requests: write
jobs:
  resources:
    name: renovate-config
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'renovate[bot]' }}
    steps:
      - name: action
        uses: colonel-byte/zarf-pkg-distro-k0s/.github/reusable/renvote@dbc93ca8b7e5abc3df639330de69f8875ee49c44 # main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
